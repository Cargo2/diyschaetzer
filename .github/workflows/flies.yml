name: Build and deploy Angular to netcup

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: netcup-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Angular-Anwendung bauen
        run: npm run build -- --configuration production

      - name: Build-Ausgabe prüfen
        run: test -f dist/project3/browser/index.html

      - name: SFTP-Client installieren
        run: sudo apt-get update && sudo apt-get install --yes lftp

      - name: Auf netcup veröffentlichen
        env:
          FTP_HOST: ${{ secrets.NETCUP_FLIES_FTP_HOST }}
          FTP_PORT: ${{ secrets.NETCUP_FLIES_FTP_PORT }}
          FTP_USER: ${{ secrets.NETCUP_FLIES_FTP_USER }}
          FTP_PASSWORD: ${{ secrets.NETCUP_FLIES_FTP_PASSWORD }}
          REMOTE_PATH: ${{ secrets.NETCUP_FLIES_REMOTE_PATH }}
        run: |
          set -euo pipefail
          test -n "$FTP_HOST" || { echo "::error::NETCUP_FTP_HOST fehlt"; exit 1; }
          test -n "$FTP_USER" || { echo "::error::NETCUP_FTP_USER fehlt"; exit 1; }
          test -n "$FTP_PASSWORD" || { echo "::error::NETCUP_FTP_PASSWORD fehlt"; exit 1; }
          test -n "$REMOTE_PATH" || { echo "::error::NETCUP_REMOTE_PATH fehlt"; exit 1; }
          FTP_PORT="${FTP_PORT:-21}"
          lftp <<EOF
          set cmd:fail-exit yes
          set net:max-retries 2
          set net:timeout 30
          set ftp:ssl-force yes
          set ftp:ssl-protect-data yes
          set ftp:ssl-auth TLS
          set ssl:verify-certificate yes
          set ssl:check-hostname no
          
          open -p "$FTP_PORT" "ftp://$FTP_HOST"
          user "$FTP_USER" "$FTP_PASSWORD"
          pwd
          cls -la
          mirror --reverse --delete --verbose \
            dist/project3/browser/ \
            "$REMOTE_PATH"
          bye
          EOF
