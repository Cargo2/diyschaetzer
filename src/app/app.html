<section class="app-shell">
  <header class="top-menu">
    <div class="menu-title">Fliesenprojekt</div>

    <nav class="tab-list" aria-label="Hauptnavigation">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="tab-button">
        Start
      </a>
      <a routerLink="/wizard" routerLinkActive="active" class="tab-button">
        Wizard
      </a>

      @if (resultsAvailable()) {
        <a routerLink="/summary" routerLinkActive="active" class="tab-button">
          Zusammenfassung
        </a>
      } @else {
        <button
          type="button"
          class="tab-button disabled"
          title="Bitte schließe zuerst den Wizard ab, damit die Ergebnisse neu berechnet werden können."
          (click)="openResultsPage('/summary')"
        >
          Zusammenfassung
        </button>
      }

      @if (resultsAvailable()) {
        <a routerLink="/materialliste" routerLinkActive="active" class="tab-button">
          Materialliste
        </a>
      } @else {
        <button
          type="button"
          class="tab-button disabled"
          title="Bitte schließe zuerst den Wizard ab, damit die Ergebnisse neu berechnet werden können."
          (click)="openResultsPage('/materialliste')"
        >
          Materialliste
        </button>
      }

      <a routerLink="/gesamtschaetzung" routerLinkActive="active" class="tab-button">
        Gesamtschätzung
      </a>

      <a routerLink="/ratgeber" routerLinkActive="active" class="tab-button">
        Ratgeber
      </a>
    </nav>
  </header>

  <main class="content-stage">
    <router-outlet />
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>Fliesenprojekt</span>
      <nav class="footer-links" aria-label="Rechtliches">
        <a href="#">Impressum</a>
        <a href="#">Datenschutz</a>
        <a href="#">Kontakt</a>
      </nav>
    </div>
  </footer>
</section>
