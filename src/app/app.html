<section class="app-shell">
  <header class="top-menu" [class.menu-open]="menuOpen()">
    <div class="menu-bar">
      <div class="menu-title">Fliesenprojekt</div>

      <button
        type="button"
        class="menu-toggle"
        [attr.aria-expanded]="menuOpen()"
        [attr.aria-label]="menuOpen() ? 'Menü schließen' : 'Menü öffnen'"
        (click)="toggleMenu()"
      >
        <span class="menu-toggle-bars" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
      </button>
    </div>

    <nav class="tab-list" aria-label="Hauptnavigation">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="tab-button" (click)="closeMenu()">
        Start
      </a>
      <a routerLink="/wizard" routerLinkActive="active" class="tab-button" (click)="closeMenu()">
        Wizard
      </a>

      @if (resultsAvailable()) {
        <a routerLink="/summary" routerLinkActive="active" class="tab-button" (click)="closeMenu()">
          Zusammenfassung
        </a>
      } @else {
        <button
          type="button"
          class="tab-button disabled"
          title="Bitte schließe zuerst den Wizard ab, damit die Ergebnisse neu berechnet werden können."
          (click)="openResultsPage('/summary')"
        >
          Zusammenfassung
        </button>
      }

      @if (resultsAvailable()) {
        <a routerLink="/materialliste" routerLinkActive="active" class="tab-button" (click)="closeMenu()">
          Materialliste
        </a>
      } @else {
        <button
          type="button"
          class="tab-button disabled"
          title="Bitte schließe zuerst den Wizard ab, damit die Ergebnisse neu berechnet werden können."
          (click)="openResultsPage('/materialliste')"
        >
          Materialliste
        </button>
      }

      <a routerLink="/gesamtschaetzung" routerLinkActive="active" class="tab-button" (click)="closeMenu()">
        Gesamtschätzung
      </a>

      <!-- Ratgeber vorerst aus dem Menü ausgeblendet; Route bleibt aktiv.
      <a routerLink="/ratgeber" routerLinkActive="active" class="tab-button" (click)="closeMenu()">
        Ratgeber
      </a>
      -->
    </nav>
  </header>

  <main class="content-stage">
    <router-outlet />
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>Fliesenprojekt</span>
      <nav class="footer-links" aria-label="Rechtliches">
        <a routerLink="/impressum">Impressum</a>
        <a routerLink="/datenschutz">Datenschutz</a>
        <a routerLink="/kontakt">Kontakt</a>
      </nav>
    </div>
  </footer>

  <app-cookie-notice />
</section>
