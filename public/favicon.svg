<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fliesen-Marke wie im Header (.menu-title::before): 4 Farbquadranten,
       abgerundet, leicht gedreht. -->
  <defs>
    <clipPath id="tile">
      <rect x="3" y="3" width="26" height="26" rx="6" ry="6"/>
    </clipPath>
  </defs>
  <g transform="rotate(8 16 16)">
    <g clip-path="url(#tile)">
      <rect x="3" y="3" width="13" height="13" fill="#b4873e"/>
      <rect x="16" y="3" width="13" height="13" fill="#11574a"/>
      <rect x="16" y="16" width="13" height="13" fill="#c2703d"/>
      <rect x="3" y="16" width="13" height="13" fill="#0a352f"/>
    </g>
  </g>
</svg>
