<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Beispiel eines Profi-Angebots als Leistungsverzeichnis mit Positionen, Netto, Mehrwertsteuer und Gesamtsumme">
  <defs>
    <linearGradient id="angCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f4ee"/>
    </linearGradient>
    <linearGradient id="angTotal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a352f"/>
      <stop offset="1" stop-color="#11574a"/>
    </linearGradient>
  </defs>

  <rect x="22" y="28" width="436" height="318" rx="22" fill="#06201c" opacity="0.30"/>
  <rect x="14" y="16" width="452" height="320" rx="20" fill="url(#angCard)" stroke="#e8e0cf" stroke-width="1"/>

  <!-- Kopf mit Firmen-Branding -->
  <rect x="40" y="38" width="34" height="34" rx="9" fill="#11574a"/>
  <path d="M49 55l5 5 8-9" fill="none" stroke="#cfe6d4" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="84" y="54" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="800" fill="#15201a">Musterfliesen GmbH</text>
  <text x="84" y="71" font-family="'Segoe UI',system-ui,sans-serif" font-size="11.5" fill="#7a8a7e">Angebot Nr. 2025-0142</text>
  <text x="440" y="50" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="800" letter-spacing="2.5" fill="#c2703d">ANGEBOT</text>
  <text x="440" y="68" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="11.5" fill="#7a8a7e">Leistungsverzeichnis</text>

  <!-- Tabellenkopf -->
  <line x1="40" y1="88" x2="440" y2="88" stroke="#e8e0cf" stroke-width="1"/>
  <text x="40" y="106" font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" font-weight="800" letter-spacing="1" fill="#9aa79c">POS</text>
  <text x="86" y="106" font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" font-weight="800" letter-spacing="1" fill="#9aa79c">LEISTUNG</text>
  <text x="440" y="106" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" font-weight="800" letter-spacing="1" fill="#9aa79c">GESAMT</text>

  <!-- Positionen -->
  <text x="40" y="130" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#7a8a7e">1.001</text>
  <text x="86" y="130" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" fill="#3a463c">Verbundabdichtung Nassbereich</text>
  <text x="440" y="130" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#15201a">863 €</text>

  <text x="40" y="154" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#7a8a7e">1.003</text>
  <text x="86" y="154" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" fill="#3a463c">Wandfliesen verlegen</text>
  <text x="440" y="154" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#15201a">1.592 €</text>

  <text x="40" y="178" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#7a8a7e">1.004</text>
  <text x="86" y="178" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" fill="#3a463c">Bodenfliesen verlegen</text>
  <text x="440" y="178" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#15201a">973 €</text>

  <text x="40" y="202" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#7a8a7e">1.006</text>
  <text x="86" y="202" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" fill="#3a463c">Silikon-Anschlussfugen</text>
  <text x="440" y="202" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#15201a">743 €</text>

  <!-- Summen -->
  <line x1="40" y1="222" x2="440" y2="222" stroke="#e8e0cf" stroke-width="1"/>
  <text x="40" y="244" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" fill="#7a8a7e">Nettobetrag</text>
  <text x="440" y="244" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#15201a">4.968 €</text>
  <text x="40" y="266" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" fill="#7a8a7e">zzgl. 19 % MwSt.</text>
  <text x="440" y="266" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#15201a">944 €</text>

  <rect x="40" y="284" width="400" height="38" rx="11" fill="url(#angTotal)"/>
  <text x="58" y="308" font-family="'Segoe UI',system-ui,sans-serif" font-size="13.5" font-weight="800" fill="#eaf3ed">Gesamtsumme</text>
  <text x="422" y="308" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="800" fill="#ffffff">5.912 €</text>
