<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Beispiel-Ergebnis des Kostenschätzers: Vergleich von Eigenleistung und Profi-Kosten mit Materialliste">
  <defs>
    <linearGradient id="ergCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffefb"/>
      <stop offset="1" stop-color="#f5efe2"/>
    </linearGradient>
    <linearGradient id="ergDiy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c2703d"/>
      <stop offset="1" stop-color="#dd9059"/>
    </linearGradient>
    <linearGradient id="ergProfi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#11574a"/>
      <stop offset="1" stop-color="#2c7a4b"/>
    </linearGradient>
  </defs>

  <rect x="22" y="28" width="436" height="318" rx="22" fill="#06201c" opacity="0.30"/>
  <rect x="14" y="16" width="452" height="320" rx="20" fill="url(#ergCard)" stroke="#e8e0cf" stroke-width="1"/>

  <!-- Kopf -->
  <text x="40" y="50" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="800" letter-spacing="2.5" fill="#c2703d">DEIN ERGEBNIS</text>
  <text x="40" y="76" font-family="'Segoe UI',system-ui,sans-serif" font-size="21" font-weight="700" fill="#15201a">Badezimmer · 8,5 m²</text>
  <rect x="372" y="38" width="68" height="26" rx="13" fill="#eef5f0"/>
  <text x="406" y="55" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" fill="#11574a">geprüft</text>

  <!-- Vergleichsbalken -->
  <text x="40" y="116" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="700" fill="#3a463c">Selbst machen</text>
  <rect x="40" y="124" width="232" height="22" rx="11" fill="url(#ergDiy)"/>
  <text x="440" y="141" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="800" fill="#15201a">2.450 €</text>

  <text x="40" y="170" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="700" fill="#3a463c">Mit Profi</text>
  <rect x="40" y="178" width="400" height="22" rx="11" fill="url(#ergProfi)"/>
  <text x="430" y="195" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="800" fill="#ffffff">5.900 €</text>

  <!-- Ersparnis -->
  <rect x="40" y="220" width="196" height="30" rx="15" fill="#e3f1e5"/>
  <path d="M58 235l4 4 7-8" fill="none" stroke="#20603a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="76" y="240" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="800" fill="#20603a">Ersparnis bis 3.450 €</text>

  <!-- Materialliste -->
  <line x1="40" y1="272" x2="440" y2="272" stroke="#e8e0cf" stroke-width="1"/>
  <rect x="40" y="286" width="12" height="12" rx="3" fill="#c2703d"/>
  <text x="62" y="296" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" fill="#3a463c">Fliesen inkl. Verschnitt</text>
  <text x="440" y="296" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#15201a">~ 18 m²</text>

  <rect x="40" y="310" width="12" height="12" rx="3" fill="#2c7a4b"/>
  <text x="62" y="320" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" fill="#3a463c">Kleber &amp; Fugenmasse</text>
  <text x="440" y="320" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="700" fill="#15201a">6 Gebinde</text>
</svg>
